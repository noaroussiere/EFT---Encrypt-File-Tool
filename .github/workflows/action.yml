name: GitHub Actions
on:
  push:
    branches: [ main ]
jobs:
  build:
    name: Build for ${{ matrix.arch-name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch-name: amd64
          - platform: linux/arm64
            arch-name: arm64
          - platform: windows/amd64
            arch-name: windows-amd64
            os: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and extract binary
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --target export-stage \
            --output type=local,dest=./out \
            .

      - name: Rename binary for architecture
        run: mv ./out/encrypted_folders ./out/encrypted_folders-${{ matrix.arch-name }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: encrypted_folders-${{ matrix.arch-name }}
          path: ./out/encrypted_folders-${{ matrix.arch-name }}
          retention-days: 5