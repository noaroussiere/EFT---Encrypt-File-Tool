name: GitHub Actions
on:
  push:
    branches: [ main ]
jobs:
  build:
    name: Build for ${{ matrix.arch-name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            arch-name: linux-amd64
            os: ubuntu-latest
          - platform: linux/arm64
            arch-name: linux-arm64
            os: ubuntu-latest
          - platform: windows/amd64
            arch-name: windows-amd64
            os: windows-latest
          - platform: macos/amd64
            arch-name: macos-amd64
            os: macos-latest
          - platform: macos/arm64
            arch-name: macos-arm64
            os: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: runner.os == 'Linux'
        uses: docker/setup-buildx-action@v3

      - name: Build with Docker (Linux)
        if: runner.os == 'Linux'
        run: |
          docker buildx build \
            --platform ${{ matrix.platform }} \
            --target export-stage \
            --output type=local,dest=./out \
            .

      - name: Install Rust
        if: runner.os != 'Linux'
        uses: dtolnay/rust-toolchain@stable

      - name: Build with Cargo (Windows & macOS)
        if: runner.os != 'Linux'
        run: |
          cargo build --release
          mkdir -p out
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp target/release/encrypted_folders.exe out/encrypted_folders.exe
          else
            cp target/release/encrypted_folders out/encrypted_folders
          fi
        shell: bash

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            mv ./out/encrypted_folders.exe ./out/encrypted_folders-${{ matrix.arch-name }}.exe
          else
            mv ./out/encrypted_folders ./out/encrypted_folders-${{ matrix.arch-name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted_folders-${{ matrix.arch-name }}
          path: ./out/encrypted_folders-${{ matrix.arch-name }}*
          retention-days: 5